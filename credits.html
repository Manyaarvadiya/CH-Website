<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Horizons-Credits</title>
  <meta name="description" content="The people behind the Cosmos Minecraft mod." />
  <link rel="icon" type="image/png" href="assets/img/cosmos.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="credits-page">

  <canvas id="starfield"></canvas>

  <header class="news-header">
    <a class="news-back" href="index.html">Back</a>
  </header>

  <main class="credits-main">
    <h1>Credits</h1>

    <section class="credits-section credits-section--tight">
      <h2>Developer</h2>
      <div class="credits-developer">
        <img class="credits-avatar-lg" src="assets/credits/ghost.png" alt="GHO__ST" />
        <p class="credits-name-lg">GHO__ST</p>
      </div>
    </section>

    <section class="credits-section">
      <h2>Grand Contributors</h2>
      <div class="grand-row">
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--edge" src="assets/credits/yeet.png" alt="Yeet" />
          <p class="grand-name">Yeet</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--outer" src="assets/credits/3da.png" alt="3DA" />
          <p class="grand-name">3DA</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--mid" src="assets/credits/sqyro.png" alt="Sqyro" />
          <p class="grand-name">Sqyro</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--center" src="assets/credits/pacific.png" alt="Pacific" />
          <p class="grand-name grand-name--center">Pacific</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--mid" src="assets/credits/jamiscus.png" alt="Jamiscus" />
          <p class="grand-name">Jamiscus</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--outer" src="assets/credits/lilith.png" alt="Lilith" />
          <p class="grand-name">Lilith</p>
        </div>
        <div class="grand-item">
          <img class="grand-avatar grand-avatar--edge" src="assets/credits/mechanic_pluto.png" alt="Mech. Pluto" />
          <p class="grand-name">Mech. Pluto</p>
        </div>
      </div>
    </section>

    <section class="credits-section">
      <h2>Contributors</h2>
      <div class="credits-row">
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/grillo.png" alt="Grillo" />
          <p class="credits-name">Grillo</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/blue_spring.png" alt="Blue Spring" />
          <p class="credits-name">Blue Spring</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/frisk.png" alt="Frisk" />
          <p class="credits-name">Frisk</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/yellow_cake.png" alt="Yellow Cake" />
          <p class="credits-name">Yellow Cake</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/redstonecake.png" alt="Redstone Cake" />
          <p class="credits-name">Redstone Cake</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/nikitam.png" alt="Nikitam" />
          <p class="credits-name">Nikitam</p>
        </div>
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/me_rn.png" alt="Me Rn" />
          <p class="credits-name">Me Rn</p>
        </div>
      </div>
    </section>

    <section class="credits-section">
      <h2>Inspirers</h2>
      <div class="credits-row">
        <div class="credits-item">
          <img class="credits-avatar" src="assets/credits/wakaba.png" alt="Wakaba" />
          <p class="credits-name">Wakaba</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/starfield.js"></script>
</body>
</html>

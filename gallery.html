<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Cosmos</title>
  <meta name="description" content="Screenshots and renders from the Cosmos Minecraft mod." />
  <link rel="icon" type="image/png" href="assets/img/cosmos.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="gallery-page">

  <canvas id="starfield"></canvas>

  <header class="news-header">
    <a class="news-back" href="index.html">Back</a>
  </header>

  <main class="gallery-main">
    <h1>Gallery</h1>

  <div class="gallery-backdrop" id="galleryBackdrop">

    <figure class="gallery-lightbox" id="galleryLightbox">
      <img id="galleryLightboxImg" src="" alt="" />
    </figure>

  <script src="js/starfield.js"></script>
  <script src="js/gallery-data.js"></script>
  <script src="js/gallery.js"></script>
